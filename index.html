<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LexAI — AI-powered Indian Litigation Assistant" />
    <meta name="theme-color" content="#1c2f72" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://*.supabase.co https://*.googleapis.com https://firestore.googleapis.com https://*.mongodb.com https://api.anthropic.com https://api.openai.com https://generativelanguage.googleapis.com http://localhost:*; worker-src 'self' blob:; frame-src 'none'; object-src 'none';" />
    <title>LexAI — Indian Litigation Assistant</title>
    <style>
      /* Critical inline shell: paints instantly before the JS bundle parses.
         React replaces #root on mount, removing this automatically. */
      #app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f7f8fc;
      }
      #app-splash .spin {
        width: 38px;
        height: 38px;
        border: 3px solid #d7ddf0;
        border-top-color: #1c2f72;
        border-radius: 50%;
        animation: app-splash-spin 0.7s linear infinite;
      }
      @keyframes app-splash-spin { to { transform: rotate(360deg); } }
    </style>
    <script>
      /* Boot recovery: after a new deploy a stale cached index.html can point at
         asset hashes that no longer exist, so the entry bundle 404s and nothing
         boots (endless splash). Reload once with a cache-busting query so a fresh
         index.html + assets are fetched. The marker lives in the URL so it
         survives the reload and prevents an infinite loop. */
      (function () {
        var RP = '_cr';
        function retried() {
          try { return new URLSearchParams(location.search).has(RP); } catch (e) { return false; }
        }
        window.__lexRecover = function () {
          if (retried()) return;
          try {
            var u = new URL(location.href);
            u.searchParams.set(RP, Date.now().toString(36));
            location.replace(u.toString());
          } catch (e) { location.reload(); }
        };
        // Fast path: a build asset (entry bundle / css) failed to load.
        window.addEventListener('error', function (e) {
          var t = e && e.target;
          if (!t || !t.tagName) return;
          var url = t.src || t.href || '';
          if ((t.tagName === 'SCRIPT' || t.tagName === 'LINK') && url.indexOf('/assets/') !== -1) {
            window.__lexRecover();
          }
        }, true);
        // Fallback: nothing booted at all within the window.
        window.__lexWatchdog = setTimeout(function () {
          if (!window.__appMounted) window.__lexRecover();
        }, 10000);
      })();
    </script>
  </head>
  <body>
    <div id="root"><div id="app-splash"><div class="spin"></div></div></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
